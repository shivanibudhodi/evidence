# This workflow demonstrates building a Docker image, pushing it to JFrog Artifactory,
# and attaching an SLSA build provenance attestation to JFrog Evidence.

name: Build, Push, and Attest to JFrog

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Variables for the Docker registry (subdomain method) and image name
env:
  JF_REGISTRY: ${{ vars.JF_REGISTRY }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write      # Required for OIDC token access
      attestations: write  # Required for generating SLSA provenance

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install and Configure JFrog CLI
        id: setup-jfrog-cli
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
        with:
          oidc-provider-name: 'demo-git-intergation'
          oidc-audience: 'jfrog-github'  # Explicitly matches the JFrog OIDC config
      
      - name: Log in to JFrog Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.JF_REGISTRY }}
          username: ${{ steps.setup-jfrog-cli.outputs.oidc-user }}
          password: ${{ steps.setup-jfrog-cli.outputs.oidc-token }}

      - name: Build and Push Docker Image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Copy this EXACT line. No spaces anywhere in this string!
          tags: ${{ env.JF_REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.JF_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}

      - name: Attest Docker Image and Send to JFrog Evidence
        uses: actions/attest-build-provenance@v3
        with:
          # Standard Docker registry path
          subject-name: ${{ env.JF_REGISTRY }}/${{ env.IMAGE_NAME }}
          
          # Links the attestation to the exact image digest generated in the build step
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
